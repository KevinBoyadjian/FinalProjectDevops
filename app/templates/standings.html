<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalScorePlus - Standings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-body">
    <div class="app-shell table-page">
        <a href="/" class="back-link">← Back to live scores</a>

        <div class="standings-card">
            <h1>Ligat Ha'Al Standings</h1>

            <table>
                <thead>
                    <tr>
                        <th>Position</th>
                        <th>Team</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody>
                    {% for team in standings %}
                    <tr>
                        <td>{{ team.position }}</td>
                        <td>{{ team.team }}</td>
                        <td>{{ team.points }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
